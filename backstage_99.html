<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SAШKOFF ADMIN TEST</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 80%; max-width: 400px; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #333; color: white; }
        button { padding: 10px 20px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #status { margin-top: 20px; color: yellow; }
    </style>
</head>
<body>
    <h2>Test Admin Panel</h2>
    <input type="password" id="ghToken" placeholder="GitHub Token">
    <input type="text" id="trackTitle" placeholder="Назва пісні">
    <input type="text" id="fireUrl" placeholder="Посилання з Firebase (https://...)">
    <br>
    <button onclick="testPush()">ПЕРЕВІРИТИ ЗВ'ЯЗОК</button>
    <div id="status"></div>

    <script>
    async function testPush() {
        const token = document.getElementById('ghToken').value.trim();
        const title = document.getElementById('trackTitle').value.trim();
        const fireUrl = document.getElementById('fireUrl').value.trim();
        const status = document.getElementById('status');
        
        // ПЕРЕВІР ТУТ НАЗВУ!
        const REPO = "sawafran/my-web"; 

        status.innerText = "Спроба з'єднання...";

        try {
            const url = `https://api.github.com/repos/${REPO}/contents/premium.html`;
            const res = await fetch(url, {
                method: 'GET',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Cache-Control': 'no-cache'
                }
            });

            if (!res.ok) {
                const errorData = await res.json();
                throw new Error(`GitHub каже: ${errorData.message}`);
            }

            status.style.color = "lime";
            status.innerText = "Зв'язок є! Файл знайдено. Тепер можеш спробувати додати пісню через повну адмінку.";
            
        } catch (e) {
            status.style.color = "red";
            status.innerText = "Помилка: " + e.message;
            console.error(e);
        }
    }
    </script>
</body>
</html>
