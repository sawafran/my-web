<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAШKOFF | BACKSTAGE v2.0</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .admin-panel { background: #161616; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #ff0000; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; margin-bottom: 25px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #222; background: #222; color: #fff; box-sizing: border-box; outline: none; font-size: 14px; }
        input:focus { border-color: #ff0000; }
        button { background: #ff0000; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        button:hover { background: #cc0000; transform: translateY(-1px); }
        .del-btn { background: #333; margin-top: 5px; }
        .del-btn:hover { background: #444; }
        #status { text-align: center; font-size: 13px; margin-top: 20px; color: #ffff00; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2>BACKSTAGE</h2>
    
    <label>GitHub Token</label>
    <input type="password" id="ghToken" placeholder="Встав свій PAT Classic токен">
    
    <label>Назва пісні</label>
    <input type="text" id="trackTitle" placeholder="Наприклад: Літній вечір">
    
    <label>Категорія</label>
    <select id="trackCategory">
        <option value="ua">🇺🇦 Українська</option>
        <option value="intl">🌍 Зарубіжна</option>
        <option value="inst">🎹 Мінусовка</option>
    </select>
    
    <label>Firebase Audio Link</label>
    <input type="text" id="fireUrl" placeholder="https://firebasestorage...">

    <button onclick="manageTrack('add')">Опублікувати трек</button>
    <button onclick="manageTrack('del')" class="del-btn">Видалити за назвою</button>
    
    <div id="status"></div>
</div>

<script>
/**
 * Функція керування треками на GitHub
 * Олександре Миколайович, цей код автоматично оновить ваш premium.html
 */
async function manageTrack(mode) {
    const token = document.getElementById('ghToken').value.trim();
    const title = document.getElementById('trackTitle').value.trim();
    const category = document.getElementById('trackCategory').value;
    const fireUrl = document.getElementById('fireUrl').value.trim();
    const status = document.getElementById('status');
    const REPO = "sawafran/my-web"; // Ваш репозиторій

    if(!token || !title) return alert("Будь ласка, вкажіть токен та назву пісні!");
    if(mode === 'add' && !fireUrl) return alert("Вставте посилання на файл з Firebase!");

    status.style.color = "yellow";
    status.innerText = "Отримання даних з GitHub...";

    try {
        const url = `https://api.github.com/repos/${REPO}/contents/premium.html`;
        
        // 1. Отримуємо файл
        const res = await fetch(url, { 
            headers: { 'Authorization': `token ${token}` } 
        });

        if(!res.ok) {
            if(res.status === 401) throw new Error("Помилка 401: Невірний токен або немає прав (repo)");
            throw new Error("Не вдалося підключитися до GitHub");
        }

        const data = await res.json();
        // Декодуємо контент з Base64 (UTF-8 безпечно)
        let content = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));

        const startTag = ``;
        const endTag = ``;

        // 2. Очищуємо старий блок, якщо він існує (щоб не було дублікатів)
        const regex = new RegExp(`${startTag}[\\s\\S]*?${endTag}`, "g");
        content = content.replace(regex, "");

        if(mode === 'add') {
            // 3. Формуємо новий HTML код треку (Sefon style)
            const trackHtml = `\n${startTag}\n<div class="track-row">
    <div class="play-trigger" onclick="playMusic(\`${title}\`, \`${fireUrl}\`)">
        <i class="fa-solid fa-play"></i>
    </div>
    <div class="track-info-mini" onclick="playMusic(\`${title}\`, \`${fireUrl}\`)">
        <h4>${title}</h4>
        <p>Saшkoff • 2026 • Premium HQ</p>
    </div>
    <button class="buy-icon-btn" onclick="toCart(\`${title}\`, this, event)">
        <i class="fa-solid fa-cart-shopping"></i>
    </button>
</div>\n${endTag}\n`;

            const marker = `<div id="marker-${category}"></div>`;
            
            if(!content.includes(marker)) {
                throw new Error(`Маркер <div id="marker-${category}"></div> не знайдено в premium.html!`);
            }

            // Вставляємо нову пісню одразу після маркера категорії
            content = content.replace(marker, marker + trackHtml);
        }

        status.innerText = "Збереження змін...";

        // 4. Відправляємо оновлений файл назад на GitHub
        const push = await fetch(url, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ 
                message: mode === 'add' ? `Update track: ${title}` : `Delete track: ${title}`, 
                content: btoa(unescape(encodeURIComponent(content))), 
                sha: data.sha 
            })
        });

        if(push.ok) {
            status.style.color = "#00ff00";
            status.innerText = mode === 'add' ? "УСПІШНО ОПУБЛІКОВАНО!" : "УСПІШНО ВИДАЛЕНО!";
            
            // Очищуємо поля
            document.getElementById('trackTitle').value = "";
            document.getElementById('fireUrl').value = "";
        } else {
            throw new Error("GitHub не дозволив зберегти файл. Перевірте права токена.");
        }

    } catch (e) { 
        status.style.color = "#ff4444";
        status.innerText = "Помилка: " + e.message; 
        console.error(e);
    }
}
</script>

</body>
</html>
