<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAШKOFF Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --bg: #0b0b0b; --line: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Вкладки */
        .tabs-nav { display: flex; background: #111; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; background: none; border: none; color: #666; padding: 15px 5px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: white; border-bottom: 2px solid var(--primary); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Трек-лист */
        .track-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--line); }
        .play-btn { width: 40px; height: 40px; background: #1a1a1a; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 15px; cursor: pointer; border: 1px solid #333; color: var(--primary); flex-shrink: 0; }
        .track-info { flex-grow: 1; overflow: hidden; }
        .track-info h4 { margin: 0; font-size: 15px; color: #efefef; }
        
        .buy-icon-btn { background: #1a1a1a; border: 1px solid #333; color: #888; width: 38px; height: 38px; border-radius: 10px; cursor: pointer; }
        .buy-icon-btn.added { background: var(--primary); border-color: var(--primary); color: white; }

        audio { display: none; }

        /* Кошик */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #161616; padding: 15px; border-top: 2px solid var(--primary); display: none; z-index: 1001; }
        .cart-flex { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; }
        .checkout-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="tabs-nav">
    <button class="tab-btn active" onclick="openTab('ua', this)">Українські</button>
    <button class="tab-btn" onclick="openTab('intl', this)">Світові</button>
    <button class="tab-btn" onclick="openTab('inst', this)">Мінуси</button>
</div>

<div id="ua" class="tab-content active">
    <div id="marker-ua"></div>
    <div class="track-row">
        <div class="play-btn" onclick="playMusic(this)">
            <i class="fa-solid fa-play"></i>
            <audio src="https://firebasestorage.googleapis.com/v0/b/sawkoff-music.firebasestorage.app/o/%D0%9B%D1%96%D1%82%D0%BD%D1%96%D0%B9%20%D0%B2%D0%B5%D1%87%D1%96%D1%80...%20%D1%82%D0%B8%D1%88%D0%B0%20%D0%B2%20%D0%B4%D0%B2%D0%BE%D1%80%D1%96.mp3?alt=media&token=dd93a327-c92a-48b3-afec-281ac86fac68"></audio>
        </div>
        <div class="track-info">
            <h4>Літній вечір... тиша в дворі</h4>
        </div>
        <button class="buy-icon-btn" onclick="toCart('Літній вечір', 5, this)">
            <i class="fa-solid fa-cart-shopping"></i>
        </button>
    </div>
</div>

<div id="intl" class="tab-content"><div id="marker-intl"></div></div>
<div id="inst" class="tab-content"><div id="marker-inst"></div></div>

<div class="cart-bar" id="cartBar">
    <div class="cart-flex">
        <div id="cartStatus">0₴</div>
        <button class="checkout-btn" onclick="sendOrder()">ОФОРМИТИ</button>
    </div>
</div>

<script>
let cartArr = [];

// 1. ПЕРЕМИКАННЯ ВКЛАДОК (Спрощене)
function openTab(id, btn) {
    // Ховаємо все
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    // Показуємо потрібне
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
}

// 2. ПЛЕЄР (Спрощений)
function playMusic(btn) {
    const audio = btn.querySelector('audio');
    const icon = btn.querySelector('i');

    if (audio.paused) {
        // Зупиняємо всі інші
        document.querySelectorAll('audio').forEach(a => {
            a.pause();
            a.parentElement.querySelector('i').className = 'fa-solid fa-play';
        });
        audio.play();
        icon.className = 'fa-solid fa-pause';
    } else {
        audio.pause();
        icon.className = 'fa-solid fa-play';
    }
}

// 3. КОШИК
function toCart(name, price, btn) {
    const index = cartArr.indexOf(name);
    if (index > -1) {
        cartArr.splice(index, 1);
        btn.classList.remove('added');
    } else {
        cartArr.push(name);
        btn.classList.add('added');
    }

    const bar = document.getElementById('cartBar');
    if (cartArr.length > 0) {
        bar.style.display = 'block';
        let total = cartArr.length * 5;
        if (cartArr.length >= 15) total = 50;
        document.getElementById('cartStatus').innerText = total + '₴ (Вибрано: ' + cartArr.length + ')';
    } else {
        bar.style.display = 'none';
    }
}

// 4. ТЕЛЕГРАМ
function sendOrder() {
    const text = "Привіт! Замовляю:\n- " + cartArr.join("\n- ");
    window.location.href = "https://t.me/Sawkoffoficial?text=" + encodeURIComponent(text);
}
</script>
</body>
</html>
