<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAШKOFF Premium | Music Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --bg: #0b0b0b; --line: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 160px; }
        
        /* ШАПКА */
        header { background: linear-gradient(180deg, #1a0000 0%, #0b0b0b 100%); padding: 40px 15px 25px; text-align: center; border-bottom: 1px solid #222; position: relative; }
        .back-btn-top { position: absolute; top: 20px; left: 20px; color: #888; text-decoration: none; font-size: 24px; }
        .logo-circle { width: 60px; height: 60px; background: #000; border: 2px solid var(--primary); border-radius: 50%; margin: 0 auto 10px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
        header h1 { font-size: 24px; margin: 0; letter-spacing: 4px; color: #fff; text-transform: uppercase; }

        /* НАВІГАЦІЯ ВКЛАДОК */
        .tabs-nav { display: flex; background: #111; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; background: none; border: none; color: #666; padding: 15px 5px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .tab-btn.active { color: white; border-bottom: 3px solid var(--primary); background: rgba(255,0,0,0.05); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* СПИСОК ТРЕКІВ (Компактний) */
        .track-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--line); transition: 0.2s; }
        .track-row:hover { background: #141414; }
        .track-row.is-playing { background: rgba(255,0,0,0.05); }

        .play-btn-small { width: 40px; height: 40px; background: #1a1a1a; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 15px; cursor: pointer; border: 1px solid #333; color: var(--primary); flex-shrink: 0; }
        .is-playing .play-btn-small { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .track-info-mini { flex-grow: 1; overflow: hidden; cursor: pointer; }
        .track-info-mini h4 { margin: 0; font-size: 14px; font-weight: 500; color: #f2f2f2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info-mini p { margin: 2px 0 0; font-size: 11px; color: #555; }

        .buy-icon-btn { background: #1a1a1a; border: 1px solid #333; color: #888; width: 38px; height: 38px; border-radius: 10px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .buy-icon-btn.added { background: var(--primary); border-color: var(--primary); color: white; }

        /* ФІКСОВАНИЙ ПЛЕЄР ВНИЗУ (Як на Sefon) */
        .bottom-player { position: fixed; bottom: 0; left: 0; right: 0; background: #161616; border-top: 1px solid #333; padding: 15px 20px; z-index: 2000; transform: translateY(100%); transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        .bottom-player.active { transform: translateY(0); }
        
        .player-controls { display: flex; align-items: center; gap: 20px; max-width: 600px; margin: 0 auto; }
        .main-play-btn { font-size: 28px; color: var(--primary); cursor: pointer; min-width: 30px; text-align: center; }
        
        .player-track-meta { flex-grow: 1; min-width: 0; }
        .player-track-meta h5 { margin: 0; font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Перемотка */
        .seek-box { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .seek-slider { flex-grow: 1; accent-color: var(--primary); height: 4px; cursor: pointer; }
        .time-text { font-size: 10px; color: #888; font-family: monospace; min-width: 30px; }

        /* КОШИК (Вище за плеєр) */
        .cart-bar { position: fixed; bottom: 100px; left: 20px; right: 20px; background: var(--primary); padding: 10px 20px; border-radius: 12px; display: none; z-index: 1001; box-shadow: 0 5px 20px rgba(255,0,0,0.4); animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .cart-flex { display: flex; justify-content: space-between; align-items: center; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn-top"><i class="fa-solid fa-circle-chevron-left"></i></a>
    <div class="logo-circle"><i class="fa-solid fa-music"></i></div>
    <h1>SAШKOFF</h1>
    <p>Premium Store</p>
</header>

<div class="tabs-nav">
    <button class="tab-btn active" onclick="openTab('ua', this)">Українські</button>
    <button class="tab-btn" onclick="openTab('intl', this)">Світові</button>
    <button class="tab-btn" onclick="openTab('inst', this)">Мінуси</button>
</div>

<div class="container">
    <div id="ua" class="tab-content active"><div id="marker-ua"></div>

<div class="track-row">
    <div class="play-btn" onclick="playMusic(this)">
        <i class="fa-solid fa-play"></i>
        <audio src="https://firebasestorage.googleapis.com/v0/b/sawkoff-music.firebasestorage.app/o/%D0%97%D0%B0%D1%81%D0%BF%D1%96%D0%B2%D0%B0%D0%B9%20%D0%BC%D0%B5%D0%BD%D1%96%20%D1%81%D0%BE%D0%BB%D0%BE%D0%B2%D0%B5%D0%B9.mp3?alt=media&token=8ffc4e15-9f80-4745-b59a-37807d1fdca9"></audio>
    </div>
    <div class="track-info" onclick="playMusic(this.previousElementSibling)">
        <h4>Заспівай мені соловей</h4>
        <p>Saшkoff • 2026 • HQ MP3</p>
    </div>
    <button class="buy-icon-btn" onclick="toCart('Заспівай мені соловей', 5, this)">
        <i class="fa-solid fa-cart-shopping"></i>
    </button>
</div>

</div>
    <div id="intl" class="tab-content"><div id="marker-intl"></div></div>
    <div id="inst" class="tab-content"><div id="marker-inst"></div></div>
</div>

<div class="bottom-player" id="footerPlayer">
    <div class="player-controls">
        <div class="main-play-btn" onclick="toggleMainPlay()">
            <i id="mainPlayIcon" class="fa-solid fa-pause"></i>
        </div>
        <div class="player-track-meta">
            <h5 id="playerTitle">Назва пісні...</h5>
            <div class="seek-box">
                <span class="time-text" id="curTime">0:00</span>
                <input type="range" id="globalSeek" class="seek-slider" value="0" min="0" max="100" oninput="manualSeek(this)">
                <span class="time-text" id="durTime">0:00</span>
            </div>
        </div>
        <div style="font-size: 20px; color: #555;" onclick="closePlayer()"><i class="fa-solid fa-times"></i></div>
    </div>
</div>

<div class="cart-bar" id="cartBar" onclick="sendOrder()">
    <div class="cart-flex">
        <span id="cartCount">Вибрано: 0 треків</span>
        <span id="cartPrice">0₴ — ОФОРМИТИ</span>
    </div>
</div>

<audio id="globalAudio"></audio>

<script>
let cartArr = [];
const audio = document.getElementById('globalAudio');
const player = document.getElementById('footerPlayer');
const mainIcon = document.getElementById('mainPlayIcon');
const titleDisplay = document.getElementById('playerTitle');
const seekSlider = document.getElementById('globalSeek');

function openTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
}

// Функція запуску пісні зі списку
function startTrack(btn, title, url) {
    // Знімаємо підсвітку з усіх рядків
    document.querySelectorAll('.track-row').forEach(r => r.classList.remove('is-playing'));
    btn.closest('.track-row').classList.add('is-playing');

    if (audio.src !== url) {
        audio.src = url;
        titleDisplay.innerText = title;
        player.classList.add('active');
        audio.play();
        mainIcon.className = 'fa-solid fa-pause';
    } else {
        toggleMainPlay();
    }
}

function toggleMainPlay() {
    if (audio.paused) {
        audio.play();
        mainIcon.className = 'fa-solid fa-pause';
    } else {
        audio.pause();
        mainIcon.className = 'fa-solid fa-play';
    }
}

function manualSeek(slider) {
    const time = (slider.value / 100) * audio.duration;
    audio.currentTime = time;
}

audio.ontimeupdate = () => {
    if(!isNaN(audio.duration)) {
        const pct = (audio.currentTime / audio.duration) * 100;
        seekSlider.value = pct;
        document.getElementById('curTime').innerText = formatTime(audio.currentTime);
        document.getElementById('durTime').innerText = formatTime(audio.duration);
    }
};

// АВТОПЛЕЙ НАСТУПНОГО
audio.onended = () => {
    const activeRow = document.querySelector('.track-row.is-playing');
    if (activeRow) {
        const nextRow = activeRow.nextElementSibling;
        if (nextRow && nextRow.classList.contains('track-row')) {
            nextRow.querySelector('.track-info-mini').click();
        }
    }
};

function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ":" + (sec < 10 ? "0" + sec : sec);
}

function closePlayer() { player.classList.remove('active'); audio.pause(); }

function toCart(name, price, btn, event) {
    event.stopPropagation(); // Щоб не запускався плеєр при натисканні на кошик
    const index = cartArr.indexOf(name);
    if (index > -1) { cartArr.splice(index, 1); btn.classList.remove('added'); }
    else { cartArr.push(name); btn.classList.add('added'); }
    
    const bar = document.getElementById('cartBar');
    if (cartArr.length > 0) {
        bar.style.display = 'block';
        let t = cartArr.length * 5; if (cartArr.length >= 15) t = 50;
        document.getElementById('cartPrice').innerText = t + "₴ — ОФОРМИТИ";
        document.getElementById('cartCount').innerText = "Вибрано: " + cartArr.length + " треків";
    } else { bar.style.display = 'none'; }
}

function sendOrder() {
    const text = "Замовлення:\n- " + cartArr.join("\n- ");
    window.location.href = "https://t.me/Sawkoffoficial?text=" + encodeURIComponent(text);
}
</script>
</body>
</html>
