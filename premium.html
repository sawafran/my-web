<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAШKOFF Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --bg: #0b0b0b; --line: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 160px; overflow-x: hidden; }
        
        /* СОЛІДНА ШАПКА */
        header { 
            background: linear-gradient(180deg, #1f0000 0%, #0b0b0b 100%); 
            padding: 35px 15px 25px; 
            text-align: center; 
            border-bottom: 1px solid #333;
        }
        header h1 { font-size: 26px; margin: 0; letter-spacing: 5px; color: #fff; text-transform: uppercase; font-weight: 900; }
        header p { font-size: 11px; color: #666; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }

        .tabs-nav { display: flex; background: #111; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; background: none; border: none; color: #666; padding: 15px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: white; border-bottom: 3px solid var(--primary); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ТРЕК-РЯДОК (Фікс кошика справа) */
        .track-row { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            border-bottom: 1px solid var(--line); 
            width: 100%;
            box-sizing: border-box;
        }
        .track-row.is-playing { background: rgba(255,0,0,0.1); }

        .play-trigger { 
            width: 42px; height: 42px; background: #1a1a1a; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            margin-right: 15px; cursor: pointer; color: var(--primary); 
            border: 1px solid #333; flex-shrink: 0; 
        }
        
        .track-info-mini { 
            flex: 1; /* Займає весь доступний простір */
            cursor: pointer; 
            min-width: 0; 
        }
        .track-info-mini h4 { margin: 0; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info-mini p { margin: 2px 0 0; font-size: 11px; color: #555; }

        .buy-icon-btn { 
            background: #1a1a1a; border: 1px solid #333; color: #888; 
            width: 44px; height: 44px; border-radius: 12px; 
            cursor: pointer; flex-shrink: 0; margin-left: 15px; /* Відступ зліва штовхає вправо */
        }
        .buy-icon-btn.added { background: var(--primary); color: white; border-color: var(--primary); }

        /* ПЛЕЄР ВНИЗУ */
        .bottom-player { position: fixed; bottom: 0; left: 0; right: 0; background: #161616; border-top: 1px solid #333; padding: 15px 20px; z-index: 2000; display: none; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        .bottom-player.active { display: block; }
        
        .player-controls { display: flex; align-items: center; gap: 15px; max-width: 600px; margin: 0 auto; }
        .main-play-btn { font-size: 32px; color: var(--primary); cursor: pointer; width: 35px; text-align: center; }
        
        .player-track-meta { flex: 1; min-width: 0; }
        .player-track-meta h5 { margin: 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        
        .seek-box { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .seek-slider { flex: 1; accent-color: var(--primary); cursor: pointer; height: 4px; }
        .time-text { font-size: 10px; color: #888; min-width: 35px; }

        /* КНОПКА ЗАМОВЛЕННЯ */
        .cart-bar { position: fixed; bottom: 105px; right: 20px; background: var(--primary); color: white; padding: 12px 25px; border-radius: 30px; display: none; z-index: 1001; box-shadow: 0 5px 20px rgba(255,0,0,0.5); cursor: pointer; font-weight: 900; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>SAШKOFF</h1>
    <p>Official Premium Store</p>
</header>

<div class="tabs-nav">
    <button class="tab-btn active" onclick="openTab('ua', this)">Українські</button>
    <button class="tab-btn" onclick="openTab('intl', this)">Світові</button>
    <button class="tab-btn" onclick="openTab('inst', this)">Мінуси</button>
</div>

<div class="container">
    <div id="ua" class="tab-content active"><div id="marker-ua"></div></div>
    <div id="intl" class="tab-content"><div id="marker-intl"></div></div>
    <div id="inst" class="tab-content"><div id="marker-inst"></div></div>
</div>

<div class="bottom-player" id="footerPlayer">
    <div class="player-controls">
        <div class="main-play-btn" onclick="toggleMainPlay()">
            <i id="mainPlayIcon" class="fa-solid fa-pause"></i>
        </div>
        <div class="player-track-meta">
            <h5 id="playerTitle">Назва пісні...</h5>
            <div class="seek-box">
                <span class="time-text" id="curTime">0:00</span>
                <input type="range" id="globalSeek" class="seek-slider" value="0" min="0" max="100" oninput="manualSeek(this)">
                <span class="time-text" id="durTime">0:00</span>
            </div>
        </div>
        <div onclick="closePlayer()" style="cursor:pointer; color:#777;"><i class="fa-solid fa-xmark"></i></div>
    </div>
</div>

<div class="cart-bar" id="cartBar" onclick="sendOrder()">
    <span id="cartInfo">ОФОРМИТИ ЗАМОВЛЕННЯ</span>
</div>

<audio id="globalAudio"></audio>

<script>
let cartArr = [];
const audio = document.getElementById('globalAudio');
const player = document.getElementById('footerPlayer');
const mainIcon = document.getElementById('mainPlayIcon');
const titleDisplay = document.getElementById('playerTitle');
const seekSlider = document.getElementById('globalSeek');

function openTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
}

// ФУНКЦІЯ ЗАПУСКУ (викликається кнопкою або назвою)
function startTrack(title, url, element) {
    document.querySelectorAll('.track-row').forEach(r => r.classList.remove('is-playing'));
    element.closest('.track-row').classList.add('is-playing');

    if (audio.src !== url) {
        audio.src = url;
        titleDisplay.innerText = title;
        player.style.display = 'block';
        player.classList.add('active');
        audio.play().catch(e => console.log("Play failed, need user interaction"));
        mainIcon.className = 'fa-solid fa-pause';
    } else {
        toggleMainPlay();
    }
}

function toggleMainPlay() {
    if (audio.paused) {
        audio.play();
        mainIcon.className = 'fa-solid fa-pause';
    } else {
        audio.pause();
        mainIcon.className = 'fa-solid fa-play';
    }
}

function manualSeek(slider) {
    if(!isNaN(audio.duration)) {
        audio.currentTime = (slider.value / 100) * audio.duration;
    }
}

audio.ontimeupdate = () => {
    if(!isNaN(audio.duration)) {
        seekSlider.value = (audio.currentTime / audio.duration) * 100;
        document.getElementById('curTime').innerText = formatTime(audio.currentTime);
        document.getElementById('durTime').innerText = formatTime(audio.duration);
    }
};

audio.onended = () => {
    const activeRow = document.querySelector('.track-row.is-playing');
    if (activeRow) {
        const nextRow = activeRow.nextElementSibling;
        if (nextRow && nextRow.classList.contains('track-row')) {
            const nextInfo = nextRow.querySelector('.track-info-mini');
            nextInfo.click();
        }
    }
};

function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ":" + (sec < 10 ? "0" + sec : sec);
}

function closePlayer() { player.style.display = 'none'; audio.pause(); }

function toCart(name, btn, event) {
    event.stopPropagation();
    const index = cartArr.indexOf(name);
    if (index > -1) {
        cartArr.splice(index, 1);
        btn.classList.remove('added');
    } else {
        cartArr.push(name);
        btn.classList.add('added');
    }
    
    const bar = document.getElementById('cartBar');
    if (cartArr.length > 0) {
        bar.style.display = 'block';
        let total = cartArr.length * 5; 
        if (cartArr.length >= 15) total = 50;
        document.getElementById('cartInfo').innerText = total + "₴ — ОФОРМИТИ (" + cartArr.length + ")";
    } else {
        bar.style.display = 'none';
    }
}

function sendOrder() {
    const text = "Вітаю! Замовляю:\n- " + cartArr.join("\n- ");
    window.location.href = "https://t.me/Sawkoffoficial?text=" + encodeURIComponent(text);
}
</script>
</body>
</html>
