<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAШKOFF Premium | Музика</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --bg: #0b0b0b; --line: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; }
        
        header { padding: 15px; text-align: center; border-bottom: 1px solid var(--line); }
        h1 { font-size: 20px; margin: 5px 0; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }

        /* Вкладки */
        .tabs-nav { display: flex; background: #111; sticky: top; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; background: none; border: none; color: #666; padding: 15px 5px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .tab-btn.active { color: white; border-bottom: 2px solid var(--primary); }

        .tab-content { display: none; padding-top: 5px; }
        .tab-content.active { display: block; }

        /* Список треків */
        .track-row { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            border-bottom: 1px solid var(--line);
        }
        .track-row:active { background: #1a1a1a; }

        .play-btn { 
            width: 42px; 
            height: 42px; 
            background: #1a1a1a; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-right: 15px; 
            cursor: pointer;
            border: 1px solid #333;
            color: var(--primary);
            flex-shrink: 0;
        }

        .track-info { flex-grow: 1; overflow: hidden; cursor: pointer; }
        .track-info h4 { margin: 0; font-size: 15px; font-weight: 500; color: #efefef; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info p { margin: 2px 0 0 0; font-size: 11px; color: #555; }

        .buy-icon-btn { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: #888; 
            width: 38px; 
            height: 38px; 
            border-radius: 10px; 
            cursor: pointer; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 10px;
        }
        .buy-icon-btn.added { background: var(--primary); border-color: var(--primary); color: white; }

        audio { display: none; }

        /* Кошик */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #161616; padding: 15px 20px; border-top: 2px solid var(--primary); display: none; z-index: 1000; box-shadow: 0 -5px 25px rgba(0,0,0,0.8); }
        .cart-flex { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; }
        .price-tag { font-size: 22px; font-weight: 900; color: #fff; }
        .checkout-btn { background: var(--primary); color: white; text-decoration: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 15px rgba(255,0,0,0.3); }
    </style>
</head>
<body>

<header>
    <a href="index.html" style="color: #666; text-decoration: none; font-size: 12px; float: left;"><i class="fa-solid fa-chevron-left"></i> Назад</a>
    <h1>Premium Shop</h1>
</header>

<div class="tabs-nav">
    <button class="tab-btn active" onclick="openTab(event, 'ua')">Українські</button>
    <button class="tab-btn" onclick="openTab(event, 'intl')">Світові</button>
    <button class="tab-btn" onclick="openTab(event, 'inst')">Мінуси</button>
</div>

<div class="container">
    <div id="ua" class="tab-content active">
        <div id="marker-ua"></div>
        
        <div class="track-row">
            <div class="play-btn" onclick="handlePlay(this)">
                <i class="fa-solid fa-play"></i>
                <audio src="https://firebasestorage.googleapis.com/v0/b/sawkoff-music.firebasestorage.app/o/%D0%9B%D1%96%D1%82%D0%BD%D1%96%D0%B9%20%D0%B2%D0%B5%D1%87%D1%96%D1%80...%20%D1%82%D0%B8%D1%88%D0%B0%20%D0%B2%20%D0%B4%D0%B2%D0%BE%D1%80%D1%96.mp3?alt=media&token=dd93a327-c92a-48b3-afec-281ac86fac68"></audio>
            </div>
            <div class="track-info" onclick="handlePlay(this.previousElementSibling)">
                <h4>Літній вечір... тиша в дворі</h4>
                <p>Saшkoff • 2026 • HQ MP3</p>
            </div>
            <button class="buy-icon-btn" onclick="toggleCart('Літній вечір... тиша в дворі', 5, this)">
                <i class="fa-solid fa-cart-shopping"></i>
            </button>
        </div>
    </div>

    <div id="intl" class="tab-content">
        <div id="marker-intl"></div>
    </div>

    <div id="inst" class="tab-content">
        <div id="marker-inst"></div>
    </div>
</div>

<div class="cart-bar" id="cartBar">
    <div class="cart-flex">
        <div>
            <div class="price-tag" id="totalPrice">0₴</div>
            <div style="font-size: 11px; color: #888;" id="totalCount">Вибрано: 0 треків</div>
        </div>
        <button class="checkout-btn" onclick="processOrder()">ОФОРМИТИ</button>
    </div>
</div>

<script>
let cart = [];

// Функція Плеєра
function handlePlay(btn) {
    const audio = btn.querySelector('audio');
    const icon = btn.querySelector('i');
    
    // Зупиняємо всі інші аудіо
    document.querySelectorAll('audio').forEach(el => {
        if(el !== audio) {
            el.pause();
            el.currentTime = 0;
            el.parentElement.querySelector('i').className = 'fa-solid fa-play';
        }
    });

    if (audio.paused) {
        audio.play().catch(e => console.log("Помилка відтворення"));
        icon.className = 'fa-solid fa-pause';
    } else {
        audio.pause();
        icon.className = 'fa-solid fa-play';
    }
}

// Функція Вкладок
function openTab(evt, tabName) {
    // Ховаємо весь контент
    const contents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < contents.length; i++) {
        contents[i].classList.remove("active");
    }

    // Робимо всі кнопки неактивними
    const buttons = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove("active");
    }

    // Активуємо потрібну
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
}

// Функція Кошика
function toggleCart(name, price, btn) {
    const index = cart.findIndex(item => item.name === name);
    if (index > -1) {
        cart.splice(index, 1);
        btn.classList.remove("added");
    } else {
        cart.push({name, price});
        btn.classList.add("added");
    }
    
    const bar = document.getElementById("cartBar");
    const priceEl = document.getElementById("totalPrice");
    const countEl = document.getElementById("totalCount");

    if (cart.length > 0) {
        bar.style.display = "block";
        let sum = cart.length * 5;
        if (cart.length >= 15) sum = 50;
        priceEl.innerText = sum + "₴";
        countEl.innerText = "Вибрано: " + cart.length + " треків";
    } else {
        bar.style.display = "none";
    }
}

    let sum = cart.length * 5;
    if (cart.length >= 15) sum = 50;
    const list = cart.map(i => i.name).join("\n- ");
    const text
