<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAШKOFF Premium | Музика</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --bg: #0b0b0b; --line: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; }
        
        header { padding: 20px; text-align: center; border-bottom: 1px solid var(--line); }
        h1 { font-size: 22px; margin: 10px 0; color: var(--primary); letter-spacing: 2px; }

        /* Навігація вкладок як на Sefon */
        .tabs-nav { display: flex; background: #111; padding: 5px; sticky: top; }
        .tab-btn { flex: 1; background: none; border: none; color: #888; padding: 12px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .tab-btn.active { color: white; border-bottom: 2px solid var(--primary); }

        .tab-content { display: none; padding: 10px 0; }
        .tab-content.active { display: block; }

        /* Стиль списку як на Sefon */
        .track-row { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            border-bottom: 1px solid var(--line); 
            transition: 0.2s;
        }
        .track-row:hover { background: #161616; }

        .play-icon { 
            width: 40px; 
            height: 40px; 
            background: #222; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-right: 15px; 
            cursor: pointer;
            border: 1px solid #333;
            color: var(--primary);
        }

        .track-info { flex-grow: 1; cursor: pointer; }
        .track-info h4 { margin: 0; font-size: 15px; font-weight: 500; color: #efefef; }
        .track-info p { margin: 3px 0 0 0; font-size: 12px; color: #666; }

        .track-actions { display: flex; align-items: center; gap: 15px; }
        
        /* Прихований плеєр, який керується кнопкою */
        audio { display: none; }

        .buy-icon-btn { 
            background: none; 
            border: 1px solid #333; 
            color: #aaa; 
            width: 35px; 
            height: 35px; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }
        .buy-icon-btn.added { background: var(--primary); border-color: var(--primary); color: white; }

        /* Кошик */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; padding: 15px 20px; border-top: 2px solid var(--primary); display: none; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .cart-flex { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; }
        .price-tag { font-size: 20px; font-weight: bold; }
        .checkout-btn { background: var(--primary); color: white; text-decoration: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; }

    </style>
</head>
