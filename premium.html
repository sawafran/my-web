<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAШKOFF Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --bg: #0b0b0b; --line: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 120px; }
        
        header { background: linear-gradient(180deg, #1a0000 0%, #0b0b0b 100%); padding: 40px 15px 25px; text-align: center; border-bottom: 1px solid #222; position: relative; }
        .back-btn-top { position: absolute; top: 20px; left: 20px; color: #888; text-decoration: none; font-size: 24px; }
        .logo-circle { width: 60px; height: 60px; background: #000; border: 2px solid var(--primary); border-radius: 50%; margin: 0 auto 10px; display: flex; justify-content: center; align-items: center; }
        header h1 { font-size: 24px; margin: 0; letter-spacing: 4px; color: #fff; text-transform: uppercase; }

        .tabs-nav { display: flex; background: #111; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; background: none; border: none; color: #666; padding: 15px 5px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: white; border-bottom: 3px solid var(--primary); }

        .tab-content { display: none; padding: 10px 0; }
        .tab-content.active { display: block; }

        /* ТРЕК-РЯДОК */
        .track-row { padding: 15px; border-bottom: 1px solid var(--line); transition: 0.3s; }
        .track-main { display: flex; align-items: center; }
        .play-btn { width: 45px; height: 45px; background: #1a1a1a; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 15px; cursor: pointer; border: 1px solid #333; color: var(--primary); flex-shrink: 0; position: relative; }
        
        /* ВІЗУАЛІЗАЦІЯ (Пульсація при програванні) */
        .playing .play-btn { box-shadow: 0 0 15px var(--primary); border-color: var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .track-info { flex-grow: 1; overflow: hidden; }
        .track-info h4 { margin: 0; font-size: 15px; color: #efefef; }
        .track-info p { margin: 3px 0 0; font-size: 11px; color: #666; }

        /* ПЕРЕМОТКА */
        .seek-container { display: none; align-items: center; margin-top: 10px; gap: 10px; }
        .playing .seek-container { display: flex; }
        .seek-slider { flex-grow: 1; accent-color: var(--primary); height: 4px; cursor: pointer; }
        .time-box { font-size: 10px; color: #888; font-family: monospace; min-width: 30px; }

        .buy-icon-btn { background: #1a1a1a; border: 1px solid #333; color: #888; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; margin-left: 10px; }
        .buy-icon-btn.added { background: var(--primary); color: white; border-color: var(--primary); }

        /* КОШИК */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #161616; padding: 15px; border-top: 2px solid var(--primary); display: none; z-index: 1001; }
        .cart-flex { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; }
        .checkout-btn { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn-top"><i class="fa-solid fa-circle-chevron-left"></i></a>
    <div class="logo-circle"><i class="fa-solid fa-music"></i></div>
    <h1>SAШKOFF</h1>
    <p>Premium Store</p>
</header>

<div class="tabs-nav">
    <button class="tab-btn active" onclick="openTab('ua', this)">Українські</button>
    <button class="tab-btn" onclick="openTab('intl', this)">Світові</button>
    <button class="tab-btn" onclick="openTab('inst', this)">Мінуси</button>
</div>

<div class="container">
    <div id="ua" class="tab-content active"><div id="marker-ua"></div></div>
    <div id="intl" class="tab-content"><div id="marker-intl"></div></div>
    <div id="inst" class="tab-content"><div id="marker-inst"></div></div>
</div>

<div class="cart-bar" id="cartBar">
    <div class="cart-flex">
        <div id="cartStatus">0₴</div>
        <button class="checkout-btn" onclick="sendOrder()">ЗАМОВИТИ В TELEGRAM</button>
    </div>
</div>

<script>
let cartArr = [];
let currentAudio = null;

function openTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
}

function playMusic(btn) {
    const row = btn.closest('.track-row');
    const audio = btn.querySelector('audio');
    const icon = btn.querySelector('i');
    const slider = row.querySelector('.seek-slider');
    const timeCurrent = row.querySelector('.curr-time');
    const timeTotal = row.querySelector('.total-time');

    if (currentAudio && currentAudio !== audio) {
        currentAudio.pause();
        currentAudio.closest('.track-row').classList.remove('playing');
        currentAudio.parentElement.querySelector('i').className = 'fa-solid fa-play';
    }

    if (audio.paused) {
        audio.play();
        currentAudio = audio;
        icon.className = 'fa-solid fa-pause';
        row.classList.add('playing');

        // Оновлення повзунка
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            slider.value = pct || 0;
            timeCurrent.innerText = formatTime(audio.currentTime);
            if(!isNaN(audio.duration)) timeTotal.innerText = formatTime(audio.duration);
        };

        // АВТОПЛЕЙ НАСТУПНОГО ТРЕКУ
        audio.onended = () => {
            row.classList.remove('playing');
            icon.className = 'fa-solid fa-play';
            const nextRow = row.nextElementSibling;
            if (nextRow && nextRow.classList.contains('track-row')) {
                const nextPlayBtn = nextRow.querySelector('.play-btn');
                playMusic(nextPlayBtn);
            }
        };
    } else {
        audio.pause();
        icon.className = 'fa-solid fa-play';
        row.classList.remove('playing');
    }
}

// Функція для перемотки вручну
function seek(slider) {
    if (currentAudio) {
        const time = (slider.value / 100) * currentAudio.duration;
        currentAudio.currentTime = time;
    }
}

function formatTime(secs) {
    const min = Math.floor(secs / 60);
    const sec = Math.floor(secs % 60);
    return min + ":" + (sec < 10 ? "0" + sec : sec);
}

function toCart(name, price, btn) {
    const index = cartArr.indexOf(name);
    if (index > -1) { cartArr.splice(index, 1); btn.classList.remove('added'); }
    else { cartArr.push(name); btn.classList.add('added'); }
    const bar = document.getElementById('cartBar');
    if (cartArr.length > 0) {
        bar.style.display = 'block';
        let total = cartArr.length * 5;
        if (cartArr.length >= 15) total = 50;
        document.getElementById('cartStatus').innerText = total + "₴ (" + cartArr.length + ")";
    } else { bar.style.display = 'none'; }
}

function sendOrder() {
    const text = "Вітаю! Хочу замовити преміум-треки:\n" + cartArr.map(t => "• " + t).join("\n");
    window.location.href = "https://t.me/Sawkoffoficial?text=" + encodeURIComponent(text);
}
</script>

</body>
</html>
