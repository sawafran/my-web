<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAШKOFF PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --bg: #0b0b0b; --line: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* ШАПКА */
        header { background: linear-gradient(180deg, #1f0000 0%, #0b0b0b 100%); padding: 30px 15px; text-align: center; border-bottom: 1px solid #333; }
        header h1 { font-size: 24px; margin: 0; letter-spacing: 4px; color: #fff; text-transform: uppercase; font-weight: 900; }

        .tabs-nav { display: flex; background: #111; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; background: none; border: none; color: #666; padding: 15px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: white; border-bottom: 3px solid var(--primary); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* СПИСОК ТРЕКІВ */
        .track-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--line); position: relative; width: 100%; box-sizing: border-box; }
        .track-row.is-playing { background: rgba(255,0,0,0.1); }

        .play-trigger { width: 42px; height: 42px; background: #1a1a1a; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 15px; cursor: pointer; color: var(--primary); border: 1px solid #333; flex-shrink: 0; }
        
        .track-info-mini { flex: 1; cursor: pointer; min-width: 0; padding-right: 50px; }
        .track-info-mini h4 { margin: 0; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info-mini p { margin: 3px 0 0; font-size: 11px; color: #555; }

        /* КОРЗИНА - ЗАВЖДИ СПРАВА */
        .buy-icon-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: #1a1a1a; border: 1px solid #333; color: #888; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; }
        .buy-icon-btn.added { background: var(--primary); color: white; border-color: var(--primary); }

        /* ФІКСОВАНИЙ ПЛЕЄР ВНИЗУ */
        #bottomPlayer { position: fixed; bottom: 0; left: 0; right: 0; background: #161616; border-top: 2px solid var(--primary); padding: 15px 20px; z-index: 9999; display: none; box-shadow: 0 -10px 30px rgba(0,0,0,1); }
        .player-flex { display: flex; align-items: center; gap: 15px; max-width: 600px; margin: 0 auto; }
        .p-btn { font-size: 30px; color: var(--primary); cursor: pointer; width: 35px; text-align: center; }
        .p-meta { flex: 1; min-width: 0; }
        .p-meta h5 { margin: 0; font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-progress { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .p-slider { flex: 1; accent-color: var(--primary); height: 4px; cursor: pointer; }
        .p-time { font-size: 10px; color: #888; min-width: 35px; font-family: monospace; }

        .order-pill { position: fixed; bottom: 100px; right: 20px; background: var(--primary); color: white; padding: 12px 25px; border-radius: 30px; display: none; z-index: 1000; font-weight: 900; box-shadow: 0 5px 20px rgba(255,0,0,0.5); border: none; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>SAШKOFF PREMIUM</h1>
</header>

<div class="tabs-nav">
    <button class="tab-btn active" onclick="openTab('ua', this)">Українські</button>
    <button class="tab-btn" onclick="openTab('intl', this)">Світові</button>
    <button class="tab-btn" onclick="openTab('inst', this)">Мінуси</button>
</div>

<div class="container">
    <div id="ua" class="tab-content active"><div id="marker-ua"></div>

<div class="track-row">
    <div class="play-btn" onclick="playMusic(this)">
        <i class="fa-solid fa-play"></i>
        <audio src="https://firebasestorage.googleapis.com/v0/b/sawkoff-music.firebasestorage.app/o/%D0%97%D0%B0%D1%81%D0%BF%D1%96%D0%B2%D0%B0%D0%B9%20%D0%BC%D0%B5%D0%BD%D1%96%20%D1%81%D0%BE%D0%BB%D0%BE%D0%B2%D0%B5%D0%B9.mp3?alt=media&token=8ffc4e15-9f80-4745-b59a-37807d1fdca9"></audio>
    </div>
    <div class="track-info" onclick="playMusic(this.previousElementSibling)">
        <h4>Заспівай мені соловей</h4>
        <p>Saшkoff • 2026 • HQ MP3</p>
    </div>
    <button class="buy-icon-btn" onclick="toCart('Заспівай мені соловей', 5, this)">
        <i class="fa-solid fa-cart-shopping"></i>
    </button>
</div>

</div>
    <div id="intl" class="tab-content"><div id="marker-intl"></div></div>
    <div id="inst" class="tab-content"><div id="marker-inst"></div></div>
</div>

<div id="bottomPlayer">
    <div class="player-flex">
        <div class="p-btn" onclick="togglePlay()"><i id="pIcon" class="fa-solid fa-pause"></i></div>
        <div class="p-meta">
            <h5 id="pTitle">Завантаження...</h5>
            <div class="p-progress">
                <span class="p-time" id="cTime">0:00</span>
                <input type="range" id="pRange" class="p-slider" value="0" min="0" max="100" oninput="seek(this)">
                <span class="p-time" id="tTime">0:00</span>
            </div>
        </div>
        <div onclick="stopAll()" style="color:#555; cursor:pointer;"><i class="fa-solid fa-times"></i></div>
    </div>
</div>

<button class="order-pill" id="orderBtn" onclick="sendOrder()">ОФОРМИТИ</button>
<audio id="gAudio"></audio>

<script>
let cart = [];
const gAudio = document.getElementById('gAudio');
const pIcon = document.getElementById('pIcon');
const pTitle = document.getElementById('pTitle');
const pRange = document.getElementById('pRange');
const bPlayer = document.getElementById('bottomPlayer');

function openTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
}

// УНІВЕРСАЛЬНА ФУНКЦІЯ ЗАПУСКУ
function playMusic(title, url) {
    if (gAudio.src !== url) {
        gAudio.src = url;
        pTitle.innerText = title;
        bPlayer.style.display = 'block';
        gAudio.play().catch(e => console.log("Play failed: ", e));
        pIcon.className = 'fa-solid fa-pause';
    } else {
        togglePlay();
    }
}

function togglePlay() {
    if (gAudio.paused) { gAudio.play(); pIcon.className = 'fa-solid fa-pause'; }
    else { gAudio.pause(); pIcon.className = 'fa-solid fa-play'; }
}

function seek(s) { if(!isNaN(gAudio.duration)) gAudio.currentTime = (s.value / 100) * gAudio.duration; }

gAudio.ontimeupdate = () => {
    if(!isNaN(gAudio.duration)) {
        pRange.value = (gAudio.currentTime / gAudio.duration) * 100;
        document.getElementById('cTime').innerText = fmt(gAudio.currentTime);
        document.getElementById('tTime').innerText = fmt(gAudio.duration);
    }
};

function fmt(s) {
    let m = Math.floor(s/60); let sc = Math.floor(s%60);
    return m + ":" + (sc < 10 ? "0" + sc : sc);
}

function stopAll() { bPlayer.style.display = 'none'; gAudio.pause(); }

function toCart(name, btn, ev) {
    ev.stopPropagation();
    let idx = cart.indexOf(name);
    if(idx > -1) { cart.splice(idx, 1); btn.classList.remove('added'); }
    else { cart.push(name); btn.classList.add('added'); }
    let oBtn = document.getElementById('orderBtn');
    if(cart.length > 0) {
        oBtn.style.display = 'block';
        let sum = cart.length * 5; if(cart.length >= 15) sum = 50;
        oBtn.innerText = "ОФОРМИТИ (" + sum + "₴)";
    } else { oBtn.style.display = 'none'; }
}

function sendOrder() {
    window.location.href = "https://t.me/Sawkoffoficial?text=" + encodeURIComponent("Замовляю:\n- " + cart.join("\n- "));
}
</script>
</body>
</html>
